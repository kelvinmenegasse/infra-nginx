# =============================================================================
# Nginx Configuration - Keycloak SSO Proxy
# =============================================================================
# Configuração modular seguindo boas práticas:
# - conf.d/         → Snippets reutilizáveis (resolver, proxy, cors, etc.)
# - sites-available/→ Configurações de cada site (um arquivo por server)
# - sites-enabled/  → Symlinks para sites ativos
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # =========================================================================
    # Configurações básicas
    # =========================================================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Hash sizes (necessário para muitos server_names e variáveis)
    server_names_hash_bucket_size 128;
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

    # =========================================================================
    # Logging
    # =========================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format json escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for"'
    '}';

    access_log /var/log/nginx/access.log json;

    # =========================================================================
    # Performance
    # =========================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # =========================================================================
    # Gzip compression
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # =========================================================================
    # Buffer sizes for Keycloak (tokens can be large)
    # =========================================================================
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    large_client_header_buffers 4 16k;

    # =========================================================================
    # Rate limiting zones
    # =========================================================================
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # =========================================================================
    # Include modular configurations
    # =========================================================================
    include conf.d/resolver.conf;
    include conf.d/upstreams.conf;

    # =========================================================================
    # Include enabled sites
    # =========================================================================
    include sites-available/*.conf;
}
