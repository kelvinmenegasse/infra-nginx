# =============================================================================
# Transporte - Sistema de recadastramento de transporte escolar
# =============================================================================
# Server: transporte.francodarocha.sp.gov.br
# Service: transporte:3001
# Frontend: /home/usr001/apps/transporte/site/bundle
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name transporte.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name transporte.francodarocha.sp.gov.br;

    root /home/usr001/apps/transporte/site/bundle;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $upstream $upstream_transporte;
        proxy_pass http://$upstream/;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }
}
