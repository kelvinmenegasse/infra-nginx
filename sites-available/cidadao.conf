# =============================================================================
# Portal Cidadão - Realm Cidadao
# =============================================================================
# Server: cidadao.exemplo.com, cidadao.localhost
# Descrição: Portal de serviços para cidadãos (Realm Cidadao)
# =============================================================================

server {
    listen 80;
    server_name cidadao.exemplo.com cidadao.localhost;

    include conf.d/security-headers.conf;

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Placeholder - implementar portal do cidadão
    location / {
        return 200 "Portal do Cidadão - Em construção\n";
        add_header Content-Type text/plain;
    }
}
