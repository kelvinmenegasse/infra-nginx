# =============================================================================
# Castração - Sistema de agendamento de castração animal
# =============================================================================
# Server: castracao.francodarocha.sp.gov.br
# Service: castracao:80
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name castracao.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name castracao.francodarocha.sp.gov.br;

    root /var/www/html;
    index index.html index.htm;

    include conf.d/error-pages.conf;

    location / {
        set $upstream $upstream_castracao;
        proxy_pass http://$upstream;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }
}
