# =============================================================================
# Nosso Olhar (Homologação) - Ambiente de homologação
# =============================================================================
# Server: homologacao-nossoolhar.francodarocha.sp.gov.br
# Service: homologacao-nossoolhar:3000
# Frontend: /home/usr001/apps/nossoolhar-homologacao/site-hom/frontend
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name homologacao-nossoolhar.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name homologacao-nossoolhar.francodarocha.sp.gov.br;

    root /home/usr001/apps/nossoolhar-homologacao/site-hom/frontend;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $upstream $upstream_homologacao_nossoolhar;
        proxy_pass http://$upstream/;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }
}
