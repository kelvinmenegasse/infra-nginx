# =============================================================================
# Gestão de Pessoas - Sistema de RH
# =============================================================================
# Server: gestaodepessoas.francodarocha.sp.gov.br
# Service: gestaodepessoas:80
# Frontend: /home/usr001/apps/gestaodepessoas/site/bundle
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name gestaodepessoas.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name gestaodepessoas.francodarocha.sp.gov.br;

    root /home/usr001/apps/gestaodepessoas/site/bundle;
    index index.html index.htm;

    include conf.d/error-pages.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $upstream $upstream_gestaodepessoas;
        proxy_pass http://$upstream/;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }
}
