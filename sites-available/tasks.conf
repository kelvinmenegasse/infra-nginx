# =============================================================================
# Frontend Tasks - Realm Prefeitura
# =============================================================================
# Server: tasks.exemplo.com, tasks.localhost, localhost
# Descrição: Aplicação de tarefas para funcionários (Realm Prefeitura)
# =============================================================================

server {
    listen 80;
    server_name tasks.exemplo.com tasks.localhost localhost;

    include conf.d/security-headers.conf;

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Silent SSO check
    location /assets/silent-check-sso.html {
        set $frontend_upstream $upstream_frontend;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API proxy
    location /api {
        set $backend_upstream $upstream_backend;
        proxy_pass http://$backend_upstream;
        include conf.d/proxy-params.conf;
    }

    # Frontend
    location / {
        set $frontend_upstream $upstream_frontend;
        proxy_pass http://$frontend_upstream;
        include conf.d/proxy-params.conf;

        # SPA fallback
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}
