# =============================================================================
# Transporte (Homologação) - Ambiente de homologação
# =============================================================================
# Server: homologacao-transporte.francodarocha.sp.gov.br
# Service: homologacao-transporte:3006
# Frontend: /home/usr001/apps/transporte-homologacao/site-staging
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name homologacao-transporte.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name homologacao-transporte.francodarocha.sp.gov.br;

    root /home/usr001/apps/transporte-homologacao/site-staging;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $upstream $upstream_homologacao_transporte;
        proxy_pass http://$upstream/;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }
}
