# =============================================================================
# Escola de Governo - Sistema de cursos e capacitação
# =============================================================================
# Server: escoladegoverno.francodarocha.sp.gov.br
# Service: escoladegoverno:80
# Certificados: certificados:3060
# Frontend: /home/usr001/apps/escoladegoverno/site/bundle
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name escoladegoverno.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name escoladegoverno.francodarocha.sp.gov.br;

    root /home/usr001/apps/escoladegoverno/site/bundle;
    index index.html index.htm;

    include conf.d/error-pages.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $upstream $upstream_escoladegoverno;
        proxy_pass http://$upstream/;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }

    location /certs/ {
        set $upstream $upstream_certificados;
        proxy_pass http://$upstream;
        rewrite ^/certs/(.*)$ /$1 break;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }
}
