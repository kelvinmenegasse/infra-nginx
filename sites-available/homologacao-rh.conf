# =============================================================================
# RH (Homologação) - Ambiente de homologação
# =============================================================================
# Server: homologacao-rh.francodarocha.sp.gov.br
# Service: homologacao-rh:3000
# Frontend: /home/usr001/apps/avaliacaodedesempenho-homologacao/site-staging
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name homologacao-rh.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name homologacao-rh.francodarocha.sp.gov.br;

    root /home/usr001/apps/avaliacaodedesempenho-homologacao/site-staging;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $upstream $upstream_homologacao_rh;
        proxy_pass http://$upstream/;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }
}
