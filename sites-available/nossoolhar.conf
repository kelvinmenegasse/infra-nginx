# =============================================================================
# Nosso Olhar - Sistema de participação cidadã
# =============================================================================
# Server: nossoolhar.francodarocha.sp.gov.br
# Service: nossoolhar:3000
# Frontend: /home/usr001/apps/nossoolhar/site/frontend
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name nossoolhar.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name nossoolhar.francodarocha.sp.gov.br;

    root /home/usr001/apps/nossoolhar/site/frontend;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $upstream $upstream_nossoolhar;
        proxy_pass http://$upstream/;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }
}
