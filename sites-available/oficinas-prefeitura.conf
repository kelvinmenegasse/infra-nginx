# =============================================================================
# Oficinas Culturais (Admin) - Painel administrativo
# =============================================================================
# Server: oficinas-prefeitura.francodarocha.sp.gov.br
# Service: oficinas:80 (mesmo backend do site público)
# Frontend: /home/usr001/apps/oficinasculturais/builded/admin-oficinas
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name oficinas-prefeitura.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name oficinas-prefeitura.francodarocha.sp.gov.br;

    root /home/usr001/apps/oficinasculturais/builded/admin-oficinas;
    index index.html index.htm;

    include conf.d/error-pages.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $upstream $upstream_oficinas;
        proxy_pass http://$upstream/;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }
}
