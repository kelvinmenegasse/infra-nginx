# =============================================================================
# CEP - Serviço de consulta de CEP
# =============================================================================
# Server: cep.francodarocha.sp.gov.br
# Service: cep:3011
# Acesso restrito por IP
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name cep.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name cep.francodarocha.sp.gov.br;

    root /var/www/html;

    include conf.d/error-pages.conf;

    location / {
        # Acesso restrito por IP
        allow 191.240.150.178;
        allow 181.224.28.9;
        allow 192.168.0.0/24;
        allow 172.18.0.0/24;
        deny all;

        set $upstream $upstream_cep;
        proxy_pass http://$upstream;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }

    location /api/ {
        set $upstream $upstream_cep;
        proxy_pass http://$upstream/api/;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }
}
