# =============================================================================
# API Backend
# =============================================================================
# Server: api.exemplo.com, api.localhost
# Descrição: API backend para aplicações
# =============================================================================

server {
    listen 80;
    server_name api.exemplo.com api.localhost;

    # Security headers (mais restritivos para API)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Health check
    location /health {
        set $backend_upstream $upstream_backend;
        proxy_pass http://$backend_upstream/api/health;
        access_log off;
    }

    # API endpoints
    location /api {
        limit_req zone=api_limit burst=100 nodelay;

        set $backend_upstream $upstream_backend;
        proxy_pass http://$backend_upstream;
        include conf.d/proxy-params.conf;

        # CORS
        include conf.d/cors.conf;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    location / {
        return 404;
    }
}
