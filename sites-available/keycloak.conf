# =============================================================================
# Keycloak Auth Server
# =============================================================================
# Server: auth.exemplo.com, auth.localhost
# Descrição: Servidor de autenticação SSO Keycloak
# =============================================================================

server {
    listen 80;
    listen 8080;
    server_name auth.exemplo.com auth.localhost;

    include conf.d/security-headers.conf;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Keycloak admin console - rate limited
    location /admin {
        limit_req zone=auth_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        set $keycloak_upstream $upstream_keycloak;
        proxy_pass http://$keycloak_upstream;
        include conf.d/proxy-params.conf;
    }

    # Keycloak auth endpoints - rate limited
    location /realms {
        limit_req zone=auth_limit burst=50 nodelay;

        set $keycloak_upstream $upstream_keycloak;
        proxy_pass http://$keycloak_upstream;
        include conf.d/proxy-params.conf;

        # CORS for SSO
        include conf.d/cors.conf;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Keycloak resources (JS, CSS, images)
    location /resources {
        set $keycloak_upstream $upstream_keycloak;
        proxy_pass http://$keycloak_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static resources
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Keycloak JS adapter
    location /js {
        set $keycloak_upstream $upstream_keycloak;
        proxy_pass http://$keycloak_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Robots.txt - disallow indexing
    location /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
        add_header Content-Type text/plain;
    }

    # Default - proxy to Keycloak
    location / {
        set $keycloak_upstream $upstream_keycloak;
        proxy_pass http://$keycloak_upstream;
        include conf.d/proxy-params.conf;
    }
}
