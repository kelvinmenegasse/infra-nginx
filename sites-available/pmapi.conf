# =============================================================================
# PM API - API Central da Prefeitura
# =============================================================================
# Server: pmapi.francodarocha.sp.gov.br
# Service: pmapi:3010
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name pmapi.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name pmapi.francodarocha.sp.gov.br;

    root /var/www/html;

    include conf.d/error-pages.conf;

    location / {
        set $upstream $upstream_pmapi;
        proxy_pass http://$upstream;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }

    location /api/ {
        set $upstream $upstream_pmapi;
        proxy_pass http://$upstream/api/;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }
}
