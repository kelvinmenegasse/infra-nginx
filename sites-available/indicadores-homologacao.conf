# =============================================================================
# Indicadores (Homologação) - Ambiente de homologação
# =============================================================================
# Server: indicadores-homologacao.francodarocha.sp.gov.br
# Service: homologacao-indicadores:6798
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name indicadores-homologacao.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name indicadores-homologacao.francodarocha.sp.gov.br;

    root /var/www/html;

    include conf.d/error-pages.conf;

    location / {
        set $upstream $upstream_homologacao_indicadores;
        proxy_pass http://$upstream;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }

    location /api/ {
        set $upstream $upstream_homologacao_indicadores;
        proxy_pass http://$upstream;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }
}
