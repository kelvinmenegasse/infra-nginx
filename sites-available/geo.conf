# =============================================================================
# Geo - Sistema de geolocalização
# =============================================================================
# Server: geo.francodarocha.sp.gov.br
# Nota: Configurar backend quando disponível
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name geo.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name geo.francodarocha.sp.gov.br;

    include conf.d/error-pages.conf;

    location / {
        # TODO: Configurar backend
        return 503 "Serviço em manutenção";
        add_header Content-Type text/plain;
    }
}
