# =============================================================================
# Default Server (catch-all)
# =============================================================================
# Captura requisições que não correspondem a nenhum server_name
# =============================================================================

server {
    listen 80 default_server;
    server_name _;

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 404 "Not Found\n";
        add_header Content-Type text/plain;
    }
}
