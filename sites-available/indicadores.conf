# =============================================================================
# Indicadores - Dashboard de indicadores
# =============================================================================
# Server: indicadores.francodarocha.sp.gov.br
# Service: indicadores:80
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name indicadores.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name indicadores.francodarocha.sp.gov.br;

    root /var/www/html;

    include conf.d/error-pages.conf;

    location / {
        set $upstream $upstream_indicadores;
        proxy_pass http://$upstream;
        include conf.d/proxy-params.conf;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    error_log /var/log/nginx/indicadores_error.log;
    access_log /var/log/nginx/indicadores_access.log;
}
