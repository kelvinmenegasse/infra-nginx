# =============================================================================
# Desenvolver RH - Sistema de avaliação de desempenho
# =============================================================================
# Server: desenvolver-rh.francodarocha.sp.gov.br
# Redirect: avaliacaodedesempenho.francodarocha.sp.gov.br -> desenvolver-rh
# Service: desenvolver-rh:3002
# Frontend: /home/usr001/apps/avaliacaodedesempenho/site
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name desenvolver-rh.francodarocha.sp.gov.br;
    return 301 https://$host$request_uri;
}

# Redirect old domain to new
server {
    listen 80;
    server_name avaliacaodedesempenho.francodarocha.sp.gov.br;
    return 301 https://desenvolver-rh.francodarocha.sp.gov.br$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name avaliacaodedesempenho.francodarocha.sp.gov.br;
    return 301 https://desenvolver-rh.francodarocha.sp.gov.br$request_uri;
}

server {
    include conf.d/ssl.conf;
    server_name desenvolver-rh.francodarocha.sp.gov.br;

    root /home/usr001/apps/avaliacaodedesempenho/site;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $upstream $upstream_desenvolver_rh;
        proxy_pass http://$upstream/;
        proxy_redirect off;
        include conf.d/proxy-params.conf;
    }
}
