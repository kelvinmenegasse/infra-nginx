# =============================================================================
# Docker Compose - Nginx Reverse Proxy (Production/Swarm)
# =============================================================================
# Usage: docker stack deploy -c docker-compose.prod.yml nginx
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Nginx - Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./sites-available:/etc/nginx/sites-available:ro
      - ./cert:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

# =============================================================================
# Networks
# =============================================================================
networks:
  app-network:
    external: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  nginx_logs:
