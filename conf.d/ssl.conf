# =============================================================================
# SSL Configuration - Certificados e configurações HTTPS
# =============================================================================
# Use: include conf.d/ssl.conf; dentro de server blocks HTTPS
# =============================================================================

listen 443 ssl;

ssl_certificate /home/usr001/cert/fullchain.crt;
ssl_certificate_key /home/usr001/cert/francodarocha.sp.gov.br.key;
ssl_password_file /home/usr001/cert/francodarocha.sp.gov.br.pass;

ssl_session_timeout 1d;
ssl_session_cache shared:MozSSL:10m;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;

add_header Strict-Transport-Security "max-age=63072000" always;
