# =============================================================================
# Upstream Mapping - Variáveis para resolução dinâmica de serviços
# =============================================================================
# Define os endereços dos serviços usando map para resolução em runtime
# Inclua este arquivo no bloco http {}
# =============================================================================

# -----------------------------------------------------------------------------
# Serviços Keycloak Stack
# -----------------------------------------------------------------------------
map $host $upstream_keycloak {
    default keycloak:8080;
}

map $host $upstream_backend {
    default backend:3000;
}

map $host $upstream_frontend {
    default frontend:80;
}

