# =============================================================================
# Error Pages - Páginas de erro padrão
# =============================================================================
# Use: include conf.d/error-pages.conf; dentro de server blocks
# =============================================================================

error_page 400 401 403 404 405 408 500 502 503 504 /error.html;

location /error.html {
    internal;
    default_type text/html;
    return 200 "<h1>Error $status</h1>";
}
